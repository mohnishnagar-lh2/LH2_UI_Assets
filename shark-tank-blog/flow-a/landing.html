<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Go Ad-Free — Shark Tank Blog (Flow A)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600;6..72,700&family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{--orange:#f59232;--orange-hover:#fa9d3f;--font-body:'Open Sans',sans-serif;--font-serif:'Newsreader','Playfair Display',Georgia,serif}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:var(--font-body);background:#000;color:#fff;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none}

.demo-strip{background:rgba(5,7,9,0.95);color:#fff;padding:8px 20px;text-align:center;font-size:12px;border-bottom:1px solid rgba(255,255,255,0.08);position:relative;z-index:5}
.demo-strip a{color:#7bc7e8;font-weight:600;margin-left:6px}
.demo-strip .tag{display:inline-block;padding:2px 8px;background:rgba(245,146,50,0.18);border:1px solid rgba(245,146,50,0.4);border-radius:10px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#ffba75;margin-right:8px}

.hero{position:relative;min-height:calc(100vh - 30px);display:flex;align-items:center;justify-content:center;padding:60px 24px;overflow:hidden;background:#0a0e16}
.hero::before{content:'';position:absolute;inset:0;background-image:url('../assets/images/hero-stage.jpg');background-size:cover;background-position:center;background-repeat:no-repeat;z-index:0}
.hero::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0.55) 60%, rgba(0,0,0,0.7) 100%);z-index:1}

.hero-content{position:relative;z-index:2;max-width:780px;width:100%;text-align:center}
.hero h1{font-family:var(--font-serif);font-size:74px;font-weight:700;line-height:1.05;letter-spacing:-1.5px;color:#fff;margin-bottom:26px;text-shadow:0 2px 24px rgba(0,0,0,0.45)}
.hero .sub{font-size:18px;color:rgba(255,255,255,0.78);line-height:1.55;margin:0 auto 36px;max-width:520px;font-weight:400}

.cta-btn{display:inline-flex;align-items:center;justify-content:center;padding:18px 40px;background:var(--orange);color:#fff;border-radius:8px;font-size:17px;font-weight:600;font-family:var(--font-body);letter-spacing:-0.1px;transition:background 0.15s,transform 0.1s,box-shadow 0.15s;box-shadow:0 12px 36px rgba(245,146,50,0.35),0 4px 14px rgba(0,0,0,0.3)}
.cta-btn:hover{background:var(--orange-hover);color:#fff;transform:translateY(-1px);box-shadow:0 14px 42px rgba(245,146,50,0.42),0 6px 18px rgba(0,0,0,0.35)}
.cta-btn:focus-visible{outline:2px solid rgba(245,146,50,0.6);outline-offset:3px}

.price-line{margin-top:18px;font-size:13.5px;color:rgba(255,255,255,0.55);font-weight:400;letter-spacing:0.1px}
.price-line .strike{text-decoration:line-through;text-decoration-thickness:1px;color:rgba(255,255,255,0.32);margin-right:6px}
.price-line .now{color:rgba(255,255,255,0.78);font-weight:500}
.price-line .sep{color:rgba(255,255,255,0.25);margin:0 8px}

@media (prefers-reduced-motion: reduce){
  .cta-btn{transition:none}
  .cta-btn:hover{transform:none}
}

@media (max-width:760px){
  .hero{padding:40px 20px;min-height:calc(100vh - 30px)}
  .hero h1{font-size:46px;letter-spacing:-1px;margin-bottom:20px}
  .hero .sub{font-size:16px;margin-bottom:30px}
  .cta-btn{padding:16px 30px;font-size:15px;width:100%;max-width:340px}
  .price-line{font-size:12.5px}
}
@media (max-width:420px){
  .hero h1{font-size:36px}
  .hero .sub{font-size:15px}
}
</style>
</head>
<body>

<div class="demo-strip"><span class="tag">Flow A</span>Step 1 of 4 — Go Ad-Free landing (CTA → <strong>landing</strong> → login → payment). <a href="index.html">← Architecture</a></div>

<section class="hero">
  <div class="hero-content">
    <h1>You came for the story.<br>Not the ads.</h1>
    <p class="sub">Finish every pitch, deal, and update — without interruptions.</p>

    <a href="login.html" class="cta-btn">Start reading ad-free</a>

    <div class="price-line">
      <span class="strike">$2/month</span><span class="now">$1/month — today only</span>
      <span class="sep">·</span> Cancel anytime
    </div>
  </div>
</section>

</body>
</html>
